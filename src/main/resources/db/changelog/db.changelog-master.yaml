databaseChangeLog:
  - changeSet:
      id: 1-create-producers
      author: dev
      changes:
        - createTable:
            tableName: producers
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-create-products
      author: dev
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_producer
                    references: producers(id)
              - column:
                  name: attributes
                  type: json